<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>就活占い - 今日の運勢</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* 星のアニメーション */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 0.9; transform: scale(1.2); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* ヘッダー */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header .crystal-ball {
      font-size: 72px;
      animation: float 3s ease-in-out infinite;
      display: block;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #f9d423, #ff4e50, #f9d423);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      margin-top: 12px;
    }
    @keyframes shimmer {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }
    .header p {
      color: #c9b8f0;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    /* フォームカード */
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(10px);
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: #c9b8f0;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }
    .form-group label span {
      font-size: 1.1em;
      margin-right: 6px;
    }

    /* セレクト・インプット共通 */
    select, input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      appearance: none;
      cursor: pointer;
    }
    select:focus, input[type="text"]:focus {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.15);
    }
    select option { background: #302b63; color: #fff; }

    /* MBTIグリッド */
    .mbti-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .mbti-btn {
      padding: 10px 4px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #e2d9f3;
      font-size: 0.85rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .mbti-btn:hover {
      background: rgba(167,139,250,0.25);
      border-color: #a78bfa;
    }
    .mbti-btn.selected {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-color: #a78bfa;
      color: #fff;
      font-weight: 700;
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(167,139,250,0.4);
    }

    /* 占うボタン */
    .fortune-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      letter-spacing: 0.1em;
    }
    .fortune-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124,58,237,0.5);
    }
    .fortune-btn:active { transform: translateY(0); }
    .fortune-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* 結果エリア */
    #result-area {
      display: none;
    }

    .result-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .result-header .date-badge {
      display: inline-block;
      padding: 6px 20px;
      background: rgba(167,139,250,0.2);
      border: 1px solid #a78bfa;
      border-radius: 100px;
      font-size: 0.8rem;
      color: #c9b8f0;
      margin-bottom: 16px;
    }
    .result-header h2 {
      font-size: 1.6rem;
      font-weight: 700;
    }
    .result-header .profile-tags {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .tag {
      padding: 4px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .tag-mbti { background: rgba(124,58,237,0.4); border: 1px solid #7c3aed; }
    .tag-industry { background: rgba(236,72,153,0.3); border: 1px solid #ec4899; }
    .tag-zodiac { background: rgba(249,212,35,0.2); border: 1px solid #f9d423; color: #f9d423; }

    /* 総合運ゲージ */
    .overall-score-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      margin-bottom: 16px;
    }
    .score-label { font-size: 0.85rem; color: #c9b8f0; margin-bottom: 12px; }
    .score-stars {
      font-size: 2rem;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    .score-bar-bg {
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 100px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #7c3aed, #ec4899, #f9d423);
      transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }
    .score-text {
      font-size: 0.85rem;
      color: #a78bfa;
      margin-top: 10px;
      font-weight: 700;
    }

    /* 五角形レーダーチャート */
    .radar-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px 12px;
      margin-bottom: 16px;
    }
    .radar-card h3 {
      font-size: 0.85rem;
      color: #c9b8f0;
      margin-bottom: 16px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* 各カテゴリ運勢 */
    .luck-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .luck-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 6px;
      text-align: center;
    }
    .luck-item .luck-icon { font-size: 1.2rem; margin-bottom: 4px; }
    .luck-item .luck-name { font-size: 0.68rem; color: #c9b8f0; margin-bottom: 6px; }
    .luck-item .luck-score { font-size: 1rem; font-weight: 700; color: #a78bfa; }
    .luck-item .luck-stars { font-size: 0.7rem; color: #f9d423; }

    /* 今日のメッセージ */
    .message-card {
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(236,72,153,0.15));
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .message-card h3 {
      font-size: 0.85rem;
      color: #c9b8f0;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .message-card p {
      font-size: 1rem;
      line-height: 1.85;
      color: #f0ebff;
    }

    /* アドバイスリスト */
    .advice-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .advice-card h3 {
      font-size: 0.85rem;
      color: #c9b8f0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .advice-list { list-style: none; }
    .advice-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 0.95rem;
      line-height: 1.6;
      color: #e2d9f3;
    }
    .advice-list li:last-child { border-bottom: none; }
    .advice-list li .adv-icon { flex-shrink: 0; font-size: 1.1rem; }

    /* ラッキーアイテム */
    .lucky-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .lucky-item {
      background: rgba(249,212,35,0.08);
      border: 1px solid rgba(249,212,35,0.25);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }
    .lucky-item .lucky-icon { font-size: 1.3rem; display: block; margin-bottom: 6px; }
    .lucky-item .lucky-label { font-size: 0.7rem; color: #c9b8f0; margin-bottom: 4px; }
    .lucky-item .lucky-value { font-size: 0.85rem; font-weight: 700; color: #f9d423; }

    /* 今日のタスク */
    .task-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .task-card h3 {
      font-size: 0.85rem;
      color: #c9b8f0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .task-list { list-style: none; }
    .task-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 0.95rem;
      color: #e2d9f3;
      cursor: pointer;
      transition: color 0.2s;
    }
    .task-list li:last-child { border-bottom: none; }
    .task-list li .checkbox {
      width: 20px; height: 20px;
      border: 2px solid rgba(167,139,250,0.5);
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .task-list li.done .checkbox {
      background: #7c3aed;
      border-color: #7c3aed;
    }
    .task-list li.done .checkbox::after { content: '✓'; font-size: 0.75rem; }
    .task-list li.done span { text-decoration: line-through; opacity: 0.5; }

    /* もう一度ボタン */
    .retry-btn {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      color: #c9b8f0;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .retry-btn:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }

    /* 注意点カード */
    .caution-card {
      background: rgba(251,191,36,0.07);
      border: 1px solid rgba(251,191,36,0.25);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .caution-icon { font-size: 1.8rem; flex-shrink: 0; }
    .caution-body {}
    .caution-body .caution-label {
      font-size: 0.75rem;
      color: #fbbf24;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }
    .caution-body .caution-text {
      font-size: 0.95rem;
      color: #f0ebff;
      line-height: 1.7;
    }
    .caution-body .caution-tip {
      font-size: 0.8rem;
      color: #c9b8f0;
      margin-top: 8px;
      line-height: 1.6;
    }

    /* シェアカード */
    .share-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 16px;
      text-align: center;
    }
    .share-card h3 {
      font-size: 0.8rem;
      color: #c9b8f0;
      margin-bottom: 14px;
      letter-spacing: 0.05em;
    }
    .share-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .share-btn {
      flex: 1;
      max-width: 200px;
      padding: 11px 16px;
      border-radius: 12px;
      border: none;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .share-btn:hover { transform: translateY(-2px); opacity: 0.9; }
    .share-btn:active { transform: translateY(0); }
    .share-btn-x {
      background: #000;
      color: #fff;
    }
    .share-btn-copy {
      background: rgba(167,139,250,0.25);
      border: 1px solid #a78bfa;
      color: #e2d9f3;
    }
    .share-btn-copy.copied {
      background: rgba(52,211,153,0.2);
      border-color: #34d399;
      color: #34d399;
    }

    /* 救いカード */
    .comfort-card {
      background: linear-gradient(135deg, rgba(249,212,35,0.08), rgba(236,72,153,0.08));
      border: 1px solid rgba(249,212,35,0.3);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      text-align: center;
    }
    .comfort-card h3 {
      font-size: 0.8rem;
      color: #f9d423;
      margin-bottom: 14px;
      letter-spacing: 0.1em;
    }
    .comfort-card p {
      font-size: 1.05rem;
      line-height: 1.9;
      color: #f0ebff;
      font-weight: 300;
    }

    /* 総合運サブメッセージ */
    .score-sub {
      font-size: 0.82rem;
      color: #c9b8f0;
      margin-top: 10px;
      font-style: italic;
    }

    /* ローディング */
    .loading {
      text-align: center;
      padding: 40px;
      display: none;
    }
    .loading-spinner {
      width: 50px; height: 50px;
      border: 3px solid rgba(167,139,250,0.3);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* フェードイン */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.5s ease forwards; }
    .fade-in-delay-1 { animation: fadeInUp 0.5s 0.1s ease forwards; opacity: 0; }
    .fade-in-delay-2 { animation: fadeInUp 0.5s 0.2s ease forwards; opacity: 0; }
    .fade-in-delay-3 { animation: fadeInUp 0.5s 0.3s ease forwards; opacity: 0; }
    .fade-in-delay-4 { animation: fadeInUp 0.5s 0.4s ease forwards; opacity: 0; }
    .fade-in-delay-5 { animation: fadeInUp 0.5s 0.5s ease forwards; opacity: 0; }
    .fade-in-delay-6 { animation: fadeInUp 0.5s 0.6s ease forwards; opacity: 0; }

    footer {
      text-align: center;
      color: rgba(255,255,255,0.2);
      font-size: 0.75rem;
      margin-top: 32px;
      padding-bottom: 24px;
    }
  </style>
</head>
<body>

<!-- 星の背景 -->
<div class="stars" id="stars"></div>

<div class="container">

  <!-- ヘッダー -->
  <div class="header">
    <span class="crystal-ball">🔮</span>
    <h1>就活占い</h1>
    <p>MBTI × 星座 × 志望業界で読み解く、今日の就活運勢</p>
  </div>

  <!-- 入力フォーム -->
  <div class="card" id="form-card">
    <div class="form-group">
      <label><span>✨</span> あなたのMBTI</label>
      <div class="mbti-grid" id="mbti-grid">
        <!-- JSで生成 -->
      </div>
      <input type="hidden" id="mbti-value">
    </div>

    <div class="form-group">
      <label><span>🏢</span> 志望業界</label>
      <select id="industry">
        <option value="">選んでください</option>
        <option value="consulting">コンサルティング</option>
        <option value="it">IT・テック</option>
        <option value="finance">金融・銀行・証券</option>
        <option value="maker">メーカー・製造</option>
        <option value="trading">商社</option>
        <option value="ad">広告・PR・マーケ</option>
        <option value="media">メディア・エンタメ</option>
        <option value="public">公務員・官公庁</option>
        <option value="npo">NPO・社会起業</option>
        <option value="realestate">不動産・建設</option>
        <option value="retail">小売・流通</option>
        <option value="pharma">医療・製薬</option>
      </select>
    </div>

    <div class="form-group">
      <label><span>⭐</span> 星座</label>
      <select id="zodiac">
        <option value="">選んでください</option>
        <option value="aries">牡羊座 (3/21〜4/19)</option>
        <option value="taurus">牡牛座 (4/20〜5/20)</option>
        <option value="gemini">双子座 (5/21〜6/21)</option>
        <option value="cancer">蟹座 (6/22〜7/22)</option>
        <option value="leo">獅子座 (7/23〜8/22)</option>
        <option value="virgo">乙女座 (8/23〜9/22)</option>
        <option value="libra">天秤座 (9/23〜10/23)</option>
        <option value="scorpio">蠍座 (10/24〜11/22)</option>
        <option value="sagittarius">射手座 (11/23〜12/21)</option>
        <option value="capricorn">山羊座 (12/22〜1/19)</option>
        <option value="aquarius">水瓶座 (1/20〜2/18)</option>
        <option value="pisces">魚座 (2/19〜3/20)</option>
      </select>
    </div>

    <button class="fortune-btn" id="fortune-btn" onclick="startFortune()">
      🔮 今日の運勢を占う
    </button>
  </div>

  <!-- ローディング -->
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <p style="color:#c9b8f0;">星々があなたの運勢を読み解いています...</p>
  </div>

  <!-- 結果エリア -->
  <div id="result-area">
    <!-- JSで動的生成 -->
  </div>

</div>

<footer>
  ※ これはエンタメ目的の占いです。実際の就活では自分の判断を大切に！
</footer>

<script>
// ==================================================
// データ定義
// ==================================================

const MBTI_LIST = [
  'INTJ','INTP','ENTJ','ENTP',
  'INFJ','INFP','ENFJ','ENFP',
  'ISTJ','ISFJ','ESTJ','ESFJ',
  'ISTP','ISFP','ESTP','ESFP'
];

const MBTI_TRAITS = {
  INTJ: { name: '建築家', icon: '🏛️', strength: '戦略的思考', weak: '柔軟な雑談', tip: '面接の最初は「答え」より「会話」を意識して。少し雑談に乗ってみると印象がグッと上がる。' },
  INTP: { name: '論理学者', icon: '🧠', strength: '深い分析力', weak: '決断のスピード', tip: '考えすぎて答えが遅くなりがち。「まず結論、理由は後から」を意識してみて。' },

// ==================================================
// 乱数シード（日付 + 入力値で決定論的に変わる）
// ==================================================
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function getSeed(mbti, industry, zodiac) {
  const today = new Date();
  const dateStr = `${today.getFullYear()}${today.getMonth()}${today.getDate()}`;
  const str = dateStr + mbti + industry + zodiac;
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash + str.charCodeAt(i)) | 0;
  }
  return Math.abs(hash);
}

// ==================================================
// MBTI グリッド生成
// ==================================================
// 五角形レーダーチャート SVG生成
// ==================================================
function buildPentagonSVG(luckScores) {
  const W = 340, H = 320;
  const cx = W / 2, cy = H / 2 + 8;
  const maxR = 88;
  const n = 5;

  function angle(i) { return (2 * Math.PI * i / n) - Math.PI / 2; }
  function pt(i, r) {
    return { x: cx + r * Math.cos(angle(i)), y: cy + r * Math.sin(angle(i)) };
  }
  function polyStr(r) {
    return Array.from({length: n}, (_, i) => {
      const p = pt(i, r);
      return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
    }).join(' ');
  }

  // グリッド（同心五角形）
  let grid = '';
  for (let lv = 1; lv <= 5; lv++) {
    const opacity = lv === 5 ? '0.22' : '0.08';
    const sw = lv === 5 ? '1.5' : '1';
    grid += `<polygon points="${polyStr(maxR * lv / 5)}" fill="none" stroke="rgba(255,255,255,${opacity})" stroke-width="${sw}"/>`;
  }

  // 軸線
  let axes = '';
  for (let i = 0; i < n; i++) {
    const v = pt(i, maxR);
    axes += `<line x1="${cx.toFixed(1)}" y1="${cy.toFixed(1)}" x2="${v.x.toFixed(1)}" y2="${v.y.toFixed(1)}" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>`;
  }

  // スコアポリゴン
  const scores = luckScores.map(l => l.score);
  const scorePts = scores.map((s, i) => {
    const p = pt(i, maxR * s / 5);
    return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
  }).join(' ');

  // ドット
  const dots = scores.map((s, i) => {
    const p = pt(i, maxR * s / 5);
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="5" fill="#a78bfa" stroke="rgba(255,255,255,0.8)" stroke-width="1.5"/>`;
  }).join('');

  // ラベル
  const labelR = maxR + 40;
  let labelEls = '';
  for (let i = 0; i < n; i++) {
    const p = pt(i, labelR);
    const anchor = p.x < cx - 8 ? 'end' : p.x > cx + 8 ? 'start' : 'middle';
    const stars = '★'.repeat(scores[i]) + '☆'.repeat(5 - scores[i]);
    labelEls += `
      <text x="${p.x.toFixed(1)}" y="${(p.y - 8).toFixed(1)}" text-anchor="${anchor}" font-size="12" fill="#e2d9f3" font-family="sans-serif">${luckScores[i].icon} ${luckScores[i].name}</text>
      <text x="${p.x.toFixed(1)}" y="${(p.y + 10).toFixed(1)}" text-anchor="${anchor}" font-size="11" fill="#f9d423" font-family="sans-serif">${stars}</text>
    `;
  }

  return `
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;margin:0 auto;">
      <defs>
        <radialGradient id="radarFill" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.15"/>
        </radialGradient>
      </defs>
      ${grid}
      ${axes}
      <polygon points="${scorePts}" fill="url(#radarFill)" stroke="#a78bfa" stroke-width="2.5" stroke-linejoin="round"/>
      ${dots}
      ${labelEls}
    </svg>
  `;
}

function buildMBTIGrid() {
  const grid = document.getElementById('mbti-grid');
  MBTI_LIST.forEach(mbti => {
    const btn = document.createElement('button');
    btn.className = 'mbti-btn';
    btn.textContent = mbti;
    btn.onclick = () => selectMBTI(mbti);
    btn.id = 'mbti-' + mbti;
    grid.appendChild(btn);
  });
}

function selectMBTI(mbti) {
  document.querySelectorAll('.mbti-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('mbti-' + mbti).classList.add('selected');
  document.getElementById('mbti-value').value = mbti;
}

// ==================================================
function buildStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 1;
    star.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*100}%;
      width: ${size}px;
      height: ${size}px;
      --d: ${Math.random()*3+1}s;
      animation-delay: ${Math.random()*3}s;
    `;
    container.appendChild(star);
  }
}

// ==================================================
// メイン占い処理
// ==================================================
function startFortune() {
  const mbti = document.getElementById('mbti-value').value;
  const industry = document.getElementById('industry').value;
  const zodiac = document.getElementById('zodiac').value;

  if (!mbti) { alert('MBTIを選んでください！'); return; }
  if (!industry) { alert('志望業界を選んでください！'); return; }
  if (!zodiac) { alert('星座を選んでください！'); return; }

  // ローディング表示
  document.getElementById('form-card').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    generateFortune(mbti, industry, zodiac);
  }, 1800);
}

function pick(arr, rng) {
  return arr[Math.floor(rng() * arr.length)];
}

function generateFortune(mbti, industry, zodiac) {
  const rng = seededRandom(getSeed(mbti, industry, zodiac));

  const mbtiData = MBTI_TRAITS[mbti];
  const industryData = INDUSTRY_DATA[industry];
  const zodiacData = ZODIAC_DATA[zodiac];

  // 総合運
  const overallIdx = Math.floor(rng() * OVERALL_MESSAGES.length);
  const [overallLabel, overallStars, overallScore, overallSub] = OVERALL_MESSAGES[overallIdx];
  const comfortMsg = pick(COMFORT_MESSAGES, rng);

  // 各カテゴリ運（数値スコア付き）
  const luckScores = LUCK_CATEGORIES.map(cat => {
    const starIdx = Math.floor(rng() * STAR_LEVELS.length);
    return { ...cat, stars: STAR_LEVELS[starIdx], score: 5 - starIdx };
  });

  // 今日のメッセージ
  const element = zodiacData.element;
  const elementKey = element === '火' ? 'fire' : element === '土' ? 'earth' : element === '風' ? 'wind' : 'water';
  const mainMessage = pick(TODAY_MESSAGES[elementKey], rng);

  // アドバイス（共通プールから重複なし3つ）
  const shuffled = [...ADVICE_POOL].sort(() => rng() - 0.5);
  const advices = shuffled.slice(0, 3);

  // ラッキーアイテム
  const luckyColor = pick(LUCKY_ITEMS.color, rng);
  const luckyDrink = pick(LUCKY_ITEMS.drink, rng);
  const luckyAction = pick(LUCKY_ITEMS.action, rng);

  // 今日のタスク（3つ）
  const taskShuffled = [...DAILY_TASKS].sort(() => rng() - 0.5);
  const tasks = taskShuffled.slice(0, 3);

  // 今日の日付
  const today = new Date();
  const dateStr = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
  const weekdays = ['日','月','火','水','木','金','土'];
  const weekday = weekdays[today.getDay()];

  // HTML生成
  const resultArea = document.getElementById('result-area');
  resultArea.innerHTML = `
    <div class="result-header fade-in">
      <div class="date-badge">${dateStr}（${weekday}曜日）の運勢</div>
      <h2>${mbtiData.icon} ${mbti}・${zodiacData.icon}${zodiacData.name}の就活家よ</h2>
      <div class="profile-tags">
        <span class="tag tag-mbti">${mbti} ${mbtiData.name}</span>
        <span class="tag tag-industry">${industryData.icon} ${industryData.name}志望</span>
        <span class="tag tag-zodiac">${zodiacData.icon} ${zodiacData.name}</span>
      </div>
    </div>

    <!-- 総合運 -->
    <div class="card overall-score-card fade-in-delay-1">
      <div class="score-label">本日の就活総合運</div>
      <div class="score-stars">${overallStars}</div>
      <div class="score-bar-bg">
        <div class="score-bar-fill" id="score-bar" style="width:0%"></div>
      </div>
      <div class="score-text">${overallLabel} — ${overallScore}点</div>
      <div class="score-sub">${overallSub}</div>
    </div>

    <!-- 五角形レーダーチャート -->
    <div class="radar-card fade-in-delay-2">
      <h3>⬠ 今日の運勢レーダー</h3>
      ${buildPentagonSVG(luckScores)}
    </div>

    <!-- 各カテゴリ運（数値） -->
    <div class="luck-grid fade-in-delay-2">
      ${luckScores.map(l => `
        <div class="luck-item">
          <div class="luck-icon">${l.icon}</div>
          <div class="luck-name">${l.name}</div>
          <div class="luck-score">${l.score}/5</div>
          <div class="luck-stars">${l.stars}</div>
        </div>
      `).join('')}
    </div>

    <!-- 今日のメッセージ -->
    <div class="message-card fade-in-delay-3">
      <h3>🌙 今日の就活メッセージ</h3>
      <p>${mainMessage}</p>
      <p style="margin-top:14px;font-size:0.85rem;color:#a78bfa;">
        ${mbtiData.name}の強み「<strong>${mbtiData.strength}</strong>」を活かしつつ、
        ${industryData.name}志望として「<strong>${industryData.focus}</strong>」を意識しよう。
        ${zodiacData.keyword}あふれる${zodiacData.name}の運気があなたを後押しします。
      </p>
    </div>

    <!-- MBTI注意点 -->
    <div class="caution-card fade-in-delay-3">
      <div class="caution-icon">⚠️</div>
      <div class="caution-body">
        <div class="caution-label">⚡ ${mbti}（${mbtiData.name}）の今日の注意点</div>
        <div class="caution-text">苦手：<strong>${mbtiData.weak}</strong></div>
        <div class="caution-tip">${mbtiData.tip}</div>
      </div>
    </div>

    <!-- アドバイス -->
    <div class="advice-card fade-in-delay-3">
      <h3>✨ 今日のアドバイス</h3>
      <ul class="advice-list">
        ${advices.map(a => `
          <li>
            <span class="adv-icon">${a.icon}</span>
            <span>${a.text}</span>
          </li>
        `).join('')}
      </ul>
    </div>

    <!-- ラッキーアイテム -->
    <div class="lucky-grid fade-in-delay-4">
      <div class="lucky-item">
        <span class="lucky-icon">🎨</span>
        <div class="lucky-label">ラッキーカラー</div>
        <div class="lucky-value">${luckyColor}</div>
      </div>
      <div class="lucky-item">
        <span class="lucky-icon">☕</span>
        <div class="lucky-label">ラッキードリンク</div>
        <div class="lucky-value">${luckyDrink}</div>
      </div>
      <div class="lucky-item">
        <span class="lucky-icon">⚡</span>
        <div class="lucky-label">開運アクション</div>
        <div class="lucky-value">${luckyAction}</div>
      </div>
    </div>

    <!-- 今日のタスク -->
    <div class="task-card fade-in-delay-5">
      <h3>✅ 今日やること（チェックリスト）</h3>
      <ul class="task-list" id="task-list">
        ${tasks.map((t, i) => `
          <li id="task-${i}" onclick="toggleTask(${i})">
            <div class="checkbox"></div>
            <span>${t}</span>
          </li>
        `).join('')}
      </ul>
    </div>

    <!-- 救いのひとこと -->
    <div class="comfort-card fade-in-delay-6">
      <h3>✨ 宇宙からのひとこと</h3>
      <p>「${comfortMsg}」</p>
    </div>

    <!-- シェア -->
    <div class="share-card fade-in-delay-6">
      <h3>📣 今日の運勢をシェアする</h3>
      <p style="font-size:0.75rem;color:#c9b8f0;margin-bottom:12px;">「𝕏 でシェア」を押すと運勢カード画像が自動保存されます。Xの投稿画面で添付してください！</p>
      <div class="share-btns">
        <button class="share-btn share-btn-x" onclick="shareToX()">
          𝕏 でシェア
        </button>
        <button class="share-btn share-btn-copy" id="copy-btn" onclick="copyFortune()">
          📋 テキストをコピー
        </button>
      </div>
    </div>

    <!-- もう一度 -->
    <button class="retry-btn fade-in-delay-6" onclick="resetFortune()">
      🔄 条件を変えてもう一度占う
    </button>
  `;

  resultArea.style.display = 'block';

  // シェアデータ保存
  _fortuneData = {
    mbti, mbtiIcon: mbtiData.icon, mbtiName: mbtiData.name,
    zodiacIcon: zodiacData.icon, zodiacName: zodiacData.name, zodiacKeyword: zodiacData.keyword,
    industryIcon: industryData.icon, industryName: industryData.name,
    overallLabel, overallStars, overallScore,
    comfortMsg, dateStr, weekday
  };

  // シェアテキスト生成
  const starLine = luckScores.map(l => `${l.icon}${l.name}：${l.score}/5`).join(' ／ ');
  _shareText = [
    `🔮 就活占い ${dateStr}`,
    ``,
    `${mbtiData.icon}${mbti} × ${industryData.icon}${industryData.name}志望 × ${zodiacData.icon}${zodiacData.name}`,
    `総合運：${overallLabel} ${overallStars}`,
    ``,
    window.location.href,
  ].join('\n');

  // スコアバーをアニメーション
  setTimeout(() => {
    const bar = document.getElementById('score-bar');
    if (bar) bar.style.width = overallScore + '%';
  }, 300);
}

function toggleTask(i) {
  const li = document.getElementById('task-' + i);
  li.classList.toggle('done');
}

// シェア用データをグローバルで保持
let _shareText = '';
let _fortuneData = {};

// ==================================================
// 運勢カード画像生成（Canvas）
// ==================================================
async function generateFortuneCard() {
  const d = _fortuneData;
  const W = 1080, H = 1080;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // 背景グラデーション
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#0f0c29');
  bg.addColorStop(0.5, '#302b63');
  bg.addColorStop(1, '#24243e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 星
  const rng2 = seededRandom(42);
  for (let i = 0; i < 120; i++) {
    const x = rng2() * W, y = rng2() * H;
    const r = rng2() * 2 + 0.5;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${rng2() * 0.6 + 0.2})`;
    ctx.fill();
  }

  // タイトル帯
  const titleGrad = ctx.createLinearGradient(0, 0, W, 0);
  titleGrad.addColorStop(0, 'rgba(124,58,237,0.6)');
  titleGrad.addColorStop(1, 'rgba(236,72,153,0.6)');
  ctx.fillStyle = titleGrad;
  ctx.fillRect(0, 0, W, 110);

  // タイトル
  ctx.font = 'bold 52px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('🔮 就活占い', W / 2, 74);

  // 日付
  ctx.font = '30px sans-serif';
  ctx.fillStyle = '#c9b8f0';
  ctx.fillText(`${d.dateStr}（${d.weekday}曜日）`, W / 2, 155);

  // 総合運
  ctx.font = 'bold 64px sans-serif';
  ctx.fillStyle = '#f9d423';
  ctx.fillText(`${d.overallLabel}  ${d.overallStars}`, W / 2, 245);

  // MBTIアイコン（左）
  ctx.font = '160px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(d.mbtiIcon, 270, 450);
  ctx.font = 'bold 36px sans-serif';
  ctx.fillStyle = '#e2d9f3';
  ctx.fillText(d.mbti, 270, 510);
  ctx.font = '26px sans-serif';
  ctx.fillStyle = '#a78bfa';
  ctx.fillText(d.mbtiName, 270, 550);

  // 区切り
  ctx.strokeStyle = 'rgba(167,139,250,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W / 2, 320); ctx.lineTo(W / 2, 580);
  ctx.stroke();

  // 星座アイコン（右）
  ctx.font = '160px sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(d.zodiacIcon, W - 270, 450);
  ctx.font = 'bold 36px sans-serif';
  ctx.fillStyle = '#e2d9f3';
  ctx.fillText(d.zodiacName, W - 270, 510);
  ctx.font = '26px sans-serif';
  ctx.fillStyle = '#f9d423';
  ctx.fillText(d.zodiacKeyword, W - 270, 550);

  // 業界タグ
  ctx.font = '28px sans-serif';
  ctx.fillStyle = '#ec4899';
  ctx.fillText(`${d.industryIcon} ${d.industryName}志望`, W / 2, 625);

  // 区切り線
  const divGrad = ctx.createLinearGradient(100, 0, W - 100, 0);
  divGrad.addColorStop(0, 'transparent');
  divGrad.addColorStop(0.5, 'rgba(167,139,250,0.5)');
  divGrad.addColorStop(1, 'transparent');
  ctx.strokeStyle = divGrad;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(100, 660); ctx.lineTo(W - 100, 660);
  ctx.stroke();

  // 宇宙からのひとこと
  ctx.font = '22px sans-serif';
  ctx.fillStyle = '#c9b8f0';
  ctx.fillText('✨ 宇宙からのひとこと', W / 2, 705);

  // メッセージ（長い場合は折り返し）
  ctx.font = '28px sans-serif';
  ctx.fillStyle = '#f0ebff';
  const msg = `「${d.comfortMsg}」`;
  wrapText(ctx, msg, W / 2, 755, W - 120, 40);

  // URL
  ctx.font = '24px sans-serif';
  ctx.fillStyle = '#7c3aed';
  ctx.fillText(window.location.href, W / 2, 1030);

  return canvas;
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const chars = [...text];
  let line = '';
  let cy = y;
  for (const ch of chars) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      line = ch;
      cy += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, cy);
}

async function shareToX() {
  const btn = document.querySelector('.share-btn-x');
  btn.textContent = '⏳ カード生成中...';
  btn.disabled = true;

  try {
    const canvas = await generateFortuneCard();

    // カード画像をダウンロード
    canvas.toBlob((blob) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `就活占い_${_fortuneData.dateStr}.png`;
      a.click();
      URL.revokeObjectURL(a.href);
    }, 'image/png');

    // 少し待ってからXを開く
    setTimeout(() => {
      const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(_shareText);
      window.open(url, '_blank', 'noopener');
      btn.textContent = '𝕏 でシェア';
      btn.disabled = false;
    }, 600);

  } catch (e) {
    // fallback: テキストだけシェア
    const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(_shareText);
    window.open(url, '_blank', 'noopener');
    btn.textContent = '𝕏 でシェア';
    btn.disabled = false;
  }
}

function copyFortune() {
  navigator.clipboard.writeText(_shareText).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 テキストをコピー';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function resetFortune() {
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('form-card').style.display = 'block';
}

// ==================================================
// 初期化

buildStars();
buildMBTIGrid();
</script>
